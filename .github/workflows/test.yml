name: tests

# Gate the test harness on every push and PR (Holmes follow-up, PR #127).
# Until now only secret-scan.yml ran in CI, so scripts/test.sh — the single
# test entrypoint (docs/testing.md) — was local-only and never gated. This
# closes that gap: the bash + Node suites and the swap-ready tool-name guard
# now run on every push and pull request.
#
# Scope note: the broader CI deliverable (M1-9 / issue #16) also adds shellcheck
# linting of bin/*.sh, hooks/*.sh, and test *.sh. That lint scope stays with #16;
# this workflow is the minimal test gate the review flagged as missing.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # The Node suite uses the built-in node:test runner (no node_modules, by
      # design — docs/testing.md). Pin a current LTS so `node --test` is present.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # The single entrypoint runs both the raw-bash and Node suites and exits
      # non-zero if any test fails. Needs only system bash, node, jq — jq ships
      # on the ubuntu-latest runner (same assumption as secret-scan.yml).
      - name: Run the test suite
        run: bash scripts/test.sh

      # Swap-ready single-source-of-truth invariant (issue #87): no concrete YNAB
      # tool name may be hard-coded outside the documented allowlist.
      - name: Verify tool-name single source of truth
        run: bash bin/check-tool-name-sources.sh
