name: secret-scan

# Repo-level secret hygiene (issue #72). This repo handles a YNAB Personal
# Access Token with write access to a live financial budget, so a committed
# credential is high-severity. This workflow fails the build if a credential
# shape lands in the tree, on every push and pull request.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # Scan the whole tree for YNAB PAT shapes, cleartext YNAB_ACCESS_TOKEN
      # assignments, and PEM/private-key headers. Exits non-zero on any match.
      - name: Scan for committed secrets
        run: bash bin/secret-scan.sh

      # Prove the scanner actually catches a synthetic, token-shaped string
      # (AC6's negative test) — verified in a throwaway sandbox so no
      # token-shaped string is ever committed to the repo.
      - name: Verify the scanner catches synthetic secrets
        run: bash tests/secret-scan.test.sh
